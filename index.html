<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samawi Agro</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="p-4">

<h1 class="text-xl font-bold">SAMAWI AGRO</h1>
<p id="user">@guest</p>

<div id="products" class="grid grid-cols-2 gap-4 mt-4"></div>

<h2 class="mt-6 font-bold">Cart</h2>
<div id="cart"></div>
<h3 id="total">0 π</h3>

<button onclick="pay()" class="bg-green-600 text-white p-3 mt-3 w-full">
Lipa na Pi
</button>

<script>
const Pi = window.Pi;

let cart = [];

const products = [
 {name:"Mahindi", price:2},
 {name:"Mchele", price:3},
 {name:"Mbolea", price:5}
];

// LOAD PRODUCTS
const container = document.getElementById("products");
products.forEach(p=>{
 container.innerHTML += `
 <div class="border p-2">
   <h4>${p.name}</h4>
   <p>${p.price} π</p>
   <button onclick="add('${p.name}',${p.price})">Add</button>
 </div>`;
});

function add(n,p){
 cart.push({n,p});
 render();
}

function render(){
 let t=0;
 const c=document.getElementById("cart");
 c.innerHTML="";
 cart.forEach(i=>{
  t+=i.p;
  c.innerHTML+=`<p>${i.n} - ${i.p}</p>`;
 });
 document.getElementById("total").innerText=t+" π";
}

// PI LOGIN
window.onload=async()=>{
 Pi.init({version:"2.0"});
 const auth=await Pi.authenticate(['username'],()=>{});
 document.getElementById("user").innerText="@"+auth.user.username;
}

// PAYMENT
async function pay(){
 const total=parseFloat(document.getElementById("total").innerText);

 await Pi.createPayment({
  amount: total,
  memo: "Samawi Agro",
  metadata: {items: cart}
 },{
  onReadyForServerApproval: async (paymentId)=>{
    await fetch("http://localhost:3000/approve",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({paymentId})
    });
  },

  onReadyForServerCompletion: async (paymentId, txid)=>{
    await fetch("http://localhost:3000/complete",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({paymentId, txid})
    });

    alert("Malipo yamefanikiwa!");
    cart=[];
    render();
  },

  onCancel: ()=>alert("Cancelled"),
  onError: err=>alert(err.message)
 });
}
</script>

</body>
</html>
