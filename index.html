<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samawi Agro | Marketplace & Wallet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        .nav-active { color: #6d28d9; border-top: 3px solid #6d28d9; }
        .pi-purple { background-color: #6d28d9; }
        .pi-text-purple { color: #6d28d9; }
        body { padding-bottom: 90px; background-color: #f9fafb; }
        .view { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none; }
    </style>
</head>
<body class="text-gray-800">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-purple-100">
        <h1 class="text-xl font-black text-green-700">SAMAWI AGRO</h1>
        <div class="flex gap-4 text-gray-500">
            <div class="relative">
                <i class="fa-solid fa-bell text-xl"></i>
                <span id="notif-dot" class="absolute -top-1 -right-1 bg-red-500 w-2 h-2 rounded-full hidden"></span>
            </div>
            <i class="fa-solid fa-plus-circle text-xl text-purple-600" onclick="changeView('admin')"></i>
        </div>
    </header>

    <div id="app-container" class="container mx-auto p-4">
        
        <section id="view-home" class="view">
            <div class="bg-gradient-to-r from-green-600 to-green-800 rounded-2xl p-6 text-white mb-6 shadow-lg">
                <p class="text-xs uppercase font-bold opacity-80">Ofa ya Leo</p>
                <h2 class="text-2xl font-bold">Pata Pembejeo Bora kwa Pi</h2>
            </div>

            <h3 class="font-bold mb-4 italic text-sm">Bidhaa Mpya Sokoni</h3>
            <div id="product-list" class="grid grid-cols-2 gap-4">
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border">
                    <img src="https://images.unsplash.com/photo-1524024973431-2ad916746881?auto=format&fit=crop&w=300" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <h4 class="font-bold text-sm">Mbuzi wa Nyama</h4>
                        <p class="text-green-600 font-black">2.50 Pi</p>
                        <button onclick="addToCart('Mbuzi', 2.5)" class="w-full mt-2 pi-purple text-white py-2 rounded-lg text-[10px] font-bold">Weka Kapuni</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-admin" class="view hidden">
            <div class="bg-white p-6 rounded-2xl border shadow-md">
                <h2 class="text-xl font-bold mb-4 text-purple-700">Ongeza Bidhaa Mpya</h2>
                
                <div class="space-y-4">
                    <div class="flex flex-col items-center border-2 border-dashed border-gray-300 p-4 rounded-xl cursor-pointer" onclick="document.getElementById('img-input').click()">
                        <i class="fa-solid fa-camera text-3xl text-gray-400"></i>
                        <span class="text-xs mt-2 text-gray-500">Gusa kuweka picha (Camera/Gallery)</span>
                        <input type="file" id="img-input" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <img id="preview-img" class="mt-2 w-32 h-32 object-cover rounded hidden">
                    </div>

                    <input type="text" id="new-p-name" placeholder="Jina la bidhaa" class="w-full p-3 bg-gray-50 border rounded-lg outline-none">
                    <input type="number" id="new-p-price" placeholder="Bei (Pi)" class="w-full p-3 bg-gray-50 border rounded-lg outline-none">
                    
                    <button onclick="saveProduct()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg">WEKA SOKONI</button>
                    <button onclick="changeView('home')" class="w-full text-gray-400 text-sm">BATILISHA</button>
                </div>
            </div>
        </section>

        <section id="view-cart" class="view hidden">
            <h2 class="text-xl font-bold mb-4 text-green-700">Kapu la Manunuzi</h2>
            <div id="cart-items" class="space-y-3 mb-6"></div>
            <div id="cart-summary" class="bg-white p-4 rounded-xl shadow-md border hidden">
                <div class="flex justify-between mb-4 font-bold text-lg">
                    <span>Jumla:</span><span id="cart-total" class="text-green-700">0 Pi</span>
                </div>
                <button onclick="payWithPi()" class="w-full pi-purple text-white py-4 rounded-xl font-bold shadow-lg">LIPA KWA PI SDK</button>
            </div>
        </section>

        <section id="view-wallet" class="view hidden">
             <div class="bg-white rounded-2xl p-6 shadow-sm border text-center mb-6">
                <h2 class="text-4xl font-black text-gray-800"><span id="wallet-balance">160.35</span> <span class="text-lg pi-text-purple">Test-Pi</span></h2>
            </div>
            <p class="text-center text-gray-400 text-xs italic">Sehemu ya Wallet inaendelea kuboreshwa...</p>
        </section>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 shadow-2xl z-50">
        <button onclick="changeView('home')" id="nav-home" class="w-1/4 flex flex-col items-center gap-1 nav-active">
            <i class="fa-solid fa-house text-lg"></i><span class="text-[9px] font-bold">HOME</span>
        </button>
        <button onclick="changeView('cart')" id="nav-cart" class="w-1/4 flex flex-col items-center gap-1 text-gray-400 relative">
            <i class="fa-solid fa-cart-shopping text-lg"></i><span id="cart-count" class="absolute top-1 right-4 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span><span class="text-[9px] font-bold">CART</span>
        </button>
        <button onclick="changeView('wallet')" id="nav-wallet" class="w-1/4 flex flex-col items-center gap-1 text-gray-400">
            <i class="fa-solid fa-wallet text-lg"></i><span class="text-[9px] font-bold">WALLET</span>
        </button>
        <button onclick="alert('Profile inakuja hivi karibuni!')" class="w-1/4 flex flex-col items-center gap-1 text-gray-400">
            <i class="fa-solid fa-user text-lg"></i><span class="text-[9px] font-bold">PROFILE</span>
        </button>
    </nav>

    <script>
        const Pi = window.Pi;
        let cart = [];
        let selectedImageData = "";

        Pi.init({ version: "2.0" });

        // AUTOMATIC AUTH
        async function auth() {
            try {
                await Pi.authenticate(['username', 'payments'], (p) => console.log(p));
            } catch (e) { console.error(e); }
        }
        window.onload = auth;

        function changeView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('nav-active', 'text-gray-400'));
            if(document.getElementById('nav-' + viewId)) {
                document.getElementById('nav-' + viewId).classList.replace('text-gray-400', 'nav-active');
            }
            if(viewId === 'cart') renderCart();
        }

        // PREVIEW IMAGE LOGIC
        function previewImage(input) {
            const preview = document.getElementById('preview-img');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    selectedImageData = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // SAVE NEW PRODUCT
        function saveProduct() {
            const name = document.getElementById('new-p-name').value;
            const price = document.getElementById('new-p-price').value;
            const img = selectedImageData || "https://via.placeholder.com/300";

            if(!name || !price) {
                alert("Tafadhali jaza jina na bei!");
                return;
            }

            const productHtml = `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border view">
                    <img src="${img}" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <h4 class="font-bold text-sm">${name}</h4>
                        <p class="text-green-600 font-black">${price} Pi</p>
                        <button onclick="addToCart('${name}', ${price})" class="w-full mt-2 pi-purple text-white py-2 rounded-lg text-[10px] font-bold">Weka Kapuni</button>
                    </div>
                </div>`;
            
            document.getElementById('product-list').insertAdjacentHTML('afterbegin', productHtml);
            alert("Bidhaa imewekwa sokoni!");
            
            // Clear inputs and return home
            document.getElementById('new-p-name').value = "";
            document.getElementById('new-p-price').value = "";
            document.getElementById('preview-img').classList.add('hidden');
            selectedImageData = "";
            changeView('home');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            const countTag = document.getElementById('cart-count');
            countTag.innerText = cart.length;
            countTag.classList.remove('hidden');
            alert(name + " imewekwa kwenye kapu.");
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">Kapu lako ni tupu.</p>';
                summary.classList.add('hidden');
                return;
            }
            summary.classList.remove('hidden');
            container.innerHTML = '';
            let total = 0;
            cart.forEach((item, index) => {
                total += parseFloat(item.price);
                container.innerHTML += `
                    <div class="flex justify-between bg-white p-3 rounded-lg border">
                        <span>${item.name}</span>
                        <b>${item.price} Pi</b>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = total.toFixed(2) + " Pi";
        }
    </script>
</body>
</html>
