<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samawi Agro | Soko la Kidijitali</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .product-card { transition: transform 0.2s; border-radius: 15px; overflow: hidden; }
        .product-card:active { transform: scale(0.98); }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-gradient { background: linear-gradient(135deg, #16a34a 0%, #065f46 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <header class="glass-nav sticky top-0 z-50 px-4 py-3 shadow-sm flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-extrabold text-green-700 tracking-tight">SAMAWI<span class="text-orange-500">.</span></h1>
            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Agro Marketplace</p>
        </div>
        <div class="flex gap-3">
            <button onclick="showSection('admin')" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                <i class="fa-solid fa-user-gear"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        
        <section id="home-section">
            <div class="relative mb-6">
                <input type="text" placeholder="Tafuta mazao, mbolea..." class="w-full pl-10 pr-4 py-3 rounded-2xl bg-white border-none shadow-sm focus:ring-2 focus:ring-green-500">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-4 text-gray-400"></i>
            </div>

            <div class="btn-gradient p-5 rounded-3xl mb-8 text-white shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-xl font-bold mb-1">Ofa ya Mavuno! 🌽</h2>
                    <p class="text-green-100 text-sm">Pata punguzo la 10% unapolipa na Pi Leo.</p>
                </div>
                <i class="fa-solid fa-wheat-awn absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
            </div>

            <h3 class="font-bold text-gray-800 mb-4 flex justify-between items-center">
                Bidhaa Mpya <span class="text-xs text-green-600">Ona Zote</span>
            </h3>
            
            <div id="product-list" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="wallet-section" class="hidden">
            <div class="text-center py-10">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-wallet text-3xl text-green-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Pi Wallet</h2>
                <p class="text-gray-500 mb-6 text-sm">Salio lako la Testnet</p>
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                    <span class="text-4xl font-black text-green-700">100.50</span>
                    <span class="text-xl font-bold text-green-600 ml-1">π</span>
                </div>
            </div>
        </section>

        <section id="admin-section" class="hidden">
            <div class="bg-white p-6 rounded-3xl shadow-lg">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Panel ya Muuzaji</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Jina la Bidhaa</label>
                        <input type="text" id="p-name" class="w-full mt-1 p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Bei (Pi)</label>
                        <input type="number" id="p-price" class="w-full mt-1 p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">Picha URL</label>
                        <input type="text" id="p-img" class="w-full mt-1 p-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <button onclick="addProduct()" class="w-full btn-gradient text-white font-bold py-4 rounded-2xl shadow-md mt-4">
                        Chapisha Bidhaa
                    </button>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-gray-100 px-6 py-3 flex justify-between items-center shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="showSection('home')" class="flex flex-col items-center text-green-600">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Soko</span>
        </button>
        <button onclick="showSection('wallet')" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-wallet text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Wallet</span>
        </button>
        <button onclick="showSection('admin')" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-store text-xl"></i>
            <span class="text-[10px] font-bold mt-1">Duka Langu</span>
        </button>
    </nav>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        let products = JSON.parse(localStorage.getItem('samawi_products')) || [
            { name: "Mahindi Ghalani", price: 2.5, img: "https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400" },
            { name: "Mbolea ya DAP", price: 10.0, img: "https://images.unsplash.com/photo-1628352081506-83c43123ed6d?w=400" }
        ];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card bg-white shadow-sm border border-gray-50">
                    <img src="${p.img}" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <h3 class="font-semibold text-sm text-gray-800 truncate">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-green-700 font-black text-sm">${p.price} <small>π</small></span>
                            <button onclick="payWithPi('${p.name}', ${p.price})" class="bg-gray-100 p-2 rounded-lg text-green-600 active:bg-green-600 active:text-white">
                                <i class="fa-solid fa-cart-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(name && price) {
                products.unshift({ name, price, img: img || 'https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=400' });
                localStorage.setItem('samawi_products', JSON.stringify(products));
                alert("Bidhaa imewekwa sokoni!");
                showSection('home');
            }
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + '-section').classList.remove('hidden');
            renderProducts();
        }

        renderProducts();
    </script>
</body>
</html>
