 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Samawi Agro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="home" class="screen active">
  <h2>Samawi Agro 🌱</h2>
  <div id="homeProducts"></div>
</div>

<div id="market" class="screen">
  <h2>Soko</h2>
  <div id="marketProducts"></div>
</div>

<div id="cart" class="screen">
  <h2>Cart</h2>
  <div id="cartItems"></div>
</div>

<div id="wallet" class="screen">
  <h2>Wallet</h2>
</div>

<div id="profile" class="screen">
  <h2>Profile</h2>
</div>

<div class="bottom-nav">
  <button onclick="showScreen('home')">🏠</button>
  <button onclick="showScreen('market')">🛍️</button>
  <button onclick="showScreen('cart')">🛒</button>
  <button onclick="showScreen('wallet')">💰</button>
  <button onclick="showScreen('profile')">👤</button>
</div>

<script src="app.js"></script>
</body>
</html>
