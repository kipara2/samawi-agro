<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samawi Agro | Testnet Wallet</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .nav-active { color: #6d28d9; border-bottom: 3px solid #6d28d9; }
        .pi-purple { background-color: #6d28d9; }
        .pi-text-purple { color: #6d28d9; }
        body { padding-bottom: 90px; }
        .view { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="pi-purple p-4 shadow-md sticky top-0 z-50 flex justify-between items-center text-white">
        <h1 class="text-xl font-black">SAMAWI AGRO</h1>
        <div class="flex gap-4">
            <div class="relative">
                <i class="fa-solid fa-bell text-xl"></i>
                <span id="notif-dot" class="absolute -top-1 -right-1 bg-red-500 w-2 h-2 rounded-full hidden"></span>
            </div>
        </div>
    </header>

    <div id="app-container" class="container mx-auto p-4">
        
        <section id="view-wallet" class="view">
            <div class="bg-white rounded-2xl p-6 shadow-sm border text-center mb-6">
                <div class="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-bold inline-block mb-3">Pi Testnet</div>
                <h2 class="text-gray-500 text-xs font-bold uppercase">Salio la Majaribio</h2>
                <p class="text-4xl font-black text-gray-800"><span id="wallet-balance">100.00</span> <span class="text-lg pi-text-purple">Test-Pi</span></p>
                <p class="text-[9px] text-gray-400 mt-2 break-all" id="my-address">GDCGEFISZ457SQZNKLQCMGSJMLMJX5QVMIYTYX3X6DJYOFAUP5OHCMAH</p>
            </div>

            <div class="flex gap-2 mb-8">
                <button onclick="changeView('pay')" class="flex-1 pi-purple text-white py-3 rounded-xl font-bold shadow-lg flex flex-col items-center">
                    <i class="fa-solid fa-paper-plane mb-1"></i><span class="text-xs">TUMA</span>
                </button>
                <button onclick="showReceive()" class="flex-1 border-2 border-purple-600 pi-text-purple py-3 rounded-xl font-bold flex flex-col items-center">
                    <i class="fa-solid fa-qrcode mb-1"></i><span class="text-xs">POKEA</span>
                </button>
            </div>

            <h3 class="font-bold text-sm mb-3">History ya Miamala</h3>
            <div id="history-list" class="space-y-2">
                <p class="text-center text-gray-400 py-10 text-xs italic">Hakuna miamala bado...</p>
            </div>
        </section>

        <section id="view-pay" class="view hidden">
            <div class="bg-white p-5 rounded-2xl border shadow-sm">
                <h2 class="text-center font-bold mb-6">Tuma Test-Pi</h2>
                <div class="space-y-4">
                    <input type="text" id="target-addr" placeholder="Wallet Address" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-purple-600">
                    <input type="number" id="send-amt" placeholder="0.00 Pi" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-purple-600">
                    <button onclick="handleTestPayment()" class="w-full pi-purple text-white py-4 rounded-xl font-bold shadow-lg">THIBITISHA MUAMALA</button>
                    <button onclick="changeView('wallet')" class="w-full text-gray-400 font-bold py-2">Ghairi</button>
                </div>
            </div>
        </section>

        <div id="modal-receive" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden p-4">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 text-center">
                <h3 class="font-bold mb-4">Scan QR Code Kupokea</h3>
                <div id="qrcode" class="flex justify-center mb-6"></div>
                <div class="bg-gray-100 p-3 rounded-lg text-[10px] break-all font-mono mb-4">GDCGEFISZ457SQZNKLQCMGSJMLMJX5QVMIYTYX3X6DJYOFAUP5OHCMAH</div>
                <button onclick="closeReceive()" class="w-full pi-purple text-white py-3 rounded-xl font-bold">Funga</button>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-16 shadow-2xl z-50">
        <button onclick="changeView('home')" id="nav-home" class="flex flex-col items-center gap-1 w-1/4 pt-2 text-gray-400">
            <i class="fa-solid fa-house"></i><span class="text-[10px] font-bold uppercase">Soko</span>
        </button>
        <button onclick="changeView('wallet')" id="nav-wallet" class="flex flex-col items-center gap-1 w-1/4 pt-2 nav-active">
            <i class="fa-solid fa-wallet"></i><span class="text-[10px] font-bold uppercase">Wallet</span>
        </button>
    </nav>

    <script>
        const Pi = window.Pi;
        let myBalance = 100.00;
        let history = [];

        // 1. Initialize Pi SDK
        Pi.init({ version: "2.0" });

        // 2. Authentication
        async function authenticate() {
            try {
                const scopes = ['username', 'payments'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                console.log("Authenticated as:", auth.user.username);
            } catch (err) {
                console.error(err);
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("Found incomplete payment", payment);
            // Hapa unaweza ku-complete malipo yaliyokwama
        };

        // 3. View Management
        function changeView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + viewId).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            if(viewId === 'wallet') document.getElementById('nav-wallet').classList.add('nav-active');
        }

        function showReceive() {
            document.getElementById('modal-receive').classList.remove('hidden');
            const qrDiv = document.getElementById("qrcode");
            if(qrDiv.innerHTML === "") {
                new QRCode(qrDiv, { text: "GDCGEFISZ457SQZNKLQCMGSJMLMJX5QVMIYTYX3X6DJYOFAUP5OHCMAH", width: 180, height: 180 });
            }
        }

        function closeReceive() {
            document.getElementById('modal-receive').classList.add('hidden');
        }

        // 4. Mfumo wa Malipo (Real Testnet Transaction)
        async function handleTestPayment() {
            const amount = parseFloat(document.getElementById('send-amt').value);
            const address = document.getElementById('target-addr').value;

            if(!amount || !address) return alert("Tafadhali jaza kiasi na address!");

            try {
                const payment = await Pi.createPayment({
                    amount: amount,
                    memo: "Test Transaction kutoka Samawi Wallet",
                    metadata: { type: "test_transfer" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Approve paymentId:", paymentId);
                        // Kwenye ulimwengu wa kweli, hapa unatuma ID kwa server yako
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        updateHistory("Tuma", amount, address, "Kimekamilika", txid);
                        myBalance -= amount;
                        document.getElementById('wallet-balance').innerText = myBalance.toFixed(2);
                        showNotification("Muamala umefanikiwa!");
                        changeView('wallet');
                    },
                    onCancel: (paymentId) => console.log("User cancelled"),
                    onError: (error, payment) => alert("Hitilafu: " + error.message)
                });
            } catch (err) {
                alert("Pi SDK haikuweza kufunguka. Hakikisha upo ndani ya Pi Browser!");
            }
        }

        // 5. History & Notifications
        function updateHistory(type, amt, addr, status, txid) {
            const historyList = document.getElementById('history-list');
            if(history.length === 0) historyList.innerHTML = "";
            
            const date = new Date().toLocaleString();
            const item = `
                <div class="bg-white p-3 rounded-xl border-l-4 ${type === 'Tuma' ? 'border-red-500' : 'border-green-500'} shadow-sm">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-xs">${type} Pi</p>
                            <p class="text-[10px] text-gray-400 font-mono">${addr.substring(0,10)}...</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold ${type === 'Tuma' ? 'text-red-500' : 'text-green-600'} text-xs">${type === 'Tuma' ? '-' : '+'}${amt} Pi</p>
                            <p class="text-[8px] text-gray-400">${date}</p>
                        </div>
                    </div>
                </div>
            `;
            historyList.insertAdjacentHTML('afterbegin', item);
            history.push({type, amt, date});
        }

        function showNotification(msg) {
            document.getElementById('notif-dot').classList.remove('hidden');
            alert(msg);
        }

        authenticate();
    </script>
</body>
</html>
