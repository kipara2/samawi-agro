<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samawi Agro | Real Pi Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">

    <nav class="bg-green-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black">SAMAWI <span class="text-yellow-400">AGRO</span></h1>
            <button id="login-btn" onclick="loginWithPi()" class="bg-yellow-500 text-green-900 px-5 py-2 rounded-full font-bold">Ingia na Pi</button>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <i class="fa-solid fa-cow text-5xl text-green-600 mb-4"></i>
                <h3 class="text-xl font-bold">Ng'ombe wa Maziwa</h3>
                <p class="text-gray-500">Aina ya Friesian, Afya bora.</p>
                <div class="mt-6 flex justify-between items-center">
                    <span class="text-2xl font-black text-green-700">15.0 Pi</span>
                    <button onclick="lipa('Ngombe', 15.0)" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition">Nunua Sasa</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <i class="fa-solid fa-seedling text-5xl text-green-600 mb-4"></i>
                <h3 class="text-xl font-bold">Mahindi (Gunia 1)</h3>
                <p class="text-gray-500">Mazao mapya kutoka shambani.</p>
                <div class="mt-6 flex justify-between items-center">
                    <span class="text-2xl font-black text-green-700">2.5 Pi</span>
                    <button onclick="lipa('Mahindi', 2.5)" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition">Nunua Sasa</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function loginWithPi() {
            try {
                const auth = await Pi.authenticate(['username', 'payments'], onIncompletePayment);
                document.getElementById('login-btn').innerText = auth.user.username;
            } catch (e) { console.error(e); }
        }

        async function lipa(jina, bei) {
            const payment = await Pi.createPayment({
                amount: bei,
                memo: "Malipo ya " + jina + " - Samawi Agro",
                metadata: { item: jina }
            }, {
                onReadyForServerApproval: (id) => fetch('/api/pay', {
                    method: 'POST', 
                    body: JSON.stringify({ id, action: 'approve' }),
                    headers: {'Content-Type': 'application/json'}
                }),
                onReadyForServerCompletion: (id, txid) => {
                    alert("Hongera! Umelipa " + bei + " Pi kwa ajili ya " + jina);
                    fetch('/api/pay', {
                        method: 'POST', 
                        body: JSON.stringify({ id, txid, action: 'complete' }),
                        headers: {'Content-Type': 'application/json'}
                    });
                },
                onCancel: (id) => console.log("Umeghairi"),
                onError: (e) => alert("Hitilafu imetokea!")
            });
        }

        function onIncompletePayment(p) { /* Shughulikia malipo yaliyokwama */ }
    </script>
</body>
</html>
