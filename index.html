<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samawi Agro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://kit.fontawesome.com/a2d9d6a05b.js"></script>

<!-- PI SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-md mx-auto bg-white min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-green-700 text-white text-center py-4">
    <h1 class="text-xl font-bold">SAMAWI AGRO 🌱</h1>
    <p class="text-xs">Soko la Wakulima Tanzania</p>
</header>

<!-- SEARCH -->
<div class="p-3 bg-green-700">
    <input id="search" placeholder="Tafuta bidhaa..." class="w-full p-2 rounded outline-none">
</div>

<!-- MAIN -->
<main class="flex-1 overflow-y-auto">

<!-- HOME -->
<div id="home-view" class="p-3">
    <h2 class="font-bold mb-2">Karibu Samawi Agro</h2>
    <p class="text-sm text-gray-600">
        Nunua au uza moja kwa moja 🌱
    </p>

    <button onclick="loginWithPi()" class="mt-3 bg-black text-white w-full py-2 rounded">
        Login na Pi
    </button>
</div>

<!-- SOKO -->
<div id="soko-view" class="p-3 hidden">

<div class="flex gap-2 overflow-x-auto mb-3">

<button onclick="filterCategory('All')" class="px-3 py-1 bg-gray-200 rounded">Zote</button>
<button onclick="filterCategory('Mazao')" class="px-3 py-1 bg-green-200 rounded">Mazao</button>
<button onclick="filterCategory('Mifugo')" class="px-3 py-1 bg-yellow-200 rounded">Mifugo</button>
<button onclick="filterCategory('Vifaa')" class="px-3 py-1 bg-blue-200 rounded">Vifaa</button>

</div>

<div id="product-grid" class="grid grid-cols-2 gap-3"></div>

</div>

<!-- CART -->
<div id="cart-view" class="p-3 hidden">
    <h2 class="font-bold mb-3">Kikapu</h2>
    <div id="cart-items"></div>

    <button onclick="checkout()" class="bg-green-600 text-white w-full py-2 mt-4 rounded">
        LIPA NA PI 💰
    </button>
</div>

<!-- WALLET -->
<div id="wallet-view" class="p-3 hidden text-center">
    <h2 class="font-bold mb-3">Wallet</h2>
    <p class="text-3xl">π 120.00</p>
</div>

<!-- PROFILE -->
<div id="profile-view" class="p-3 hidden text-center">

<h2 class="font-bold mb-3">Profile</h2>

<p id="user-info"></p>

<button id="add-product-btn" onclick="showView('add')" 
class="bg-green-600 text-white w-full py-2 rounded hidden">
Ongeza Bidhaa
</button>

</div>

<!-- ADD PRODUCT -->
<div id="add-view" class="p-3 hidden">

<h2 class="font-bold mb-3">Ongeza Bidhaa</h2>

<input id="name" placeholder="Jina" class="w-full p-2 border mb-2">
<input id="price" placeholder="Bei" class="w-full p-2 border mb-2">
<input id="unit" placeholder="Unit" class="w-full p-2 border mb-2">
<input id="img" placeholder="Image URL" class="w-full p-2 border mb-2">

<select id="category" class="w-full p-2 border mb-2">
<option value="">Category</option>
<option value="Mazao">Mazao</option>
<option value="Mifugo">Mifugo</option>
<option value="Vifaa">Vifaa</option>
</select>

<select id="subcategory" class="w-full p-2 border mb-2"></select>

<button onclick="addProduct()" class="bg-green-700 text-white w-full py-2 rounded">
HIFADHI
</button>

</div>

</main>

<!-- NAV -->
<nav class="flex justify-around p-3 border-t bg-white text-xs">

<button onclick="showView('home')"><i class="fa fa-home"></i><br>Home</button>
<button onclick="showView('soko')"><i class="fa fa-store"></i><br>Soko</button>
<button onclick="showView('cart')"><i class="fa fa-cart-plus"></i><br>Cart</button>
<button onclick="showView('wallet')"><i class="fa fa-wallet"></i><br>Wallet</button>
<button onclick="showView('profile')"><i class="fa fa-user"></i><br>Profile</button>

</nav>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "samawi-agro-b0f27.firebaseapp.com",
  projectId: "samawi-agro-b0f27"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* PI INIT */
const Pi = window.Pi;
Pi.init({ version: "2.0", sandbox: true });

/* USER */
let user = { role: "buyer", paid: false, name: "Guest" };

/* LOGIN PI */
window.loginWithPi = async function(){
    const auth = await Pi.authenticate(['username','payments']);
    user.name = auth.user.username;

    document.getElementById("user-info").innerText = "User: " + user.name;
    alert("Karibu " + user.name);
}

/* SUBCATEGORIES */
const subcategories = {
    Mazao: ["Mahindi","Mpunga","Maharage","Ndizi","Viazi"],
    Mifugo: ["Ng'ombe","Mbuzi","Kuku","Kondoo"],
    Vifaa: ["Trekta","Jembe","Mbegu","Pampu"]
};

document.getElementById("category").addEventListener("change", function(){
    const sub = document.getElementById("subcategory");
    sub.innerHTML = "";

    subcategories[this.value]?.forEach(s=>{
        sub.innerHTML += `<option value="${s}">${s}</option>`;
    });
});

/* DATA */
let cart = [];
let allProducts = [];

/* LOAD */
const grid = document.getElementById("product-grid");

async function loadProducts(){
    const snap = await getDocs(collection(db,"products"));

    allProducts = [];

    snap.forEach(d=>{
        allProducts.push(d.data());
    });

    display(allProducts);
}
loadProducts();

/* DISPLAY */
function display(products){
    grid.innerHTML="";

    products.forEach(p=>{
        const div = document.createElement("div");

        div.className="bg-white shadow p-2 rounded text-center";

        div.innerHTML=`
        <img src="${p.img}" class="h-24 w-full object-cover mb-2">
        <h3 class="font-bold text-sm">${p.name}</h3>
        <p class="text-xs">${p.category} • ${p.subcategory}</p>
        <p class="text-green-700 text-xs">π${p.price}</p>

        <button class="bg-yellow-600 text-white w-full mt-2 py-1 text-xs rounded">
        ONGEZA
        </button>
        `;

        div.querySelector("button").onclick=()=>addToCart(p);

        grid.appendChild(div);
    });
}

/* FILTER */
window.filterCategory=function(c){
    if(c==="All") display(allProducts);
    else display(allProducts.filter(p=>p.category===c));
}

/* CART */
window.addToCart=function(p){
    cart.push(p);
    updateCart();
}

function updateCart(){
    const c=document.getElementById("cart-items");
    c.innerHTML="";

    cart.forEach(i=>{
        c.innerHTML+=`<div class="flex justify-between border-b py-2">
        <span>${i.name}</span><span>π${i.price}</span></div>`;
    });
}

/* PI PAYMENT */
window.checkout = async function(){

    if(cart.length===0) return alert("Cart tupu");

    let total = cart.reduce((a,b)=>a+Number(b.price),0);

    await Pi.createPayment({
        amount: total,
        memo: "Samawi Agro Order"
    });

    await addDoc(collection(db,"orders"),{
        items:cart,
        total,
        date:new Date()
    });

    alert("Imelipwa kupitia Pi 💰");

    cart=[];
    updateCart();
}

/* ADD PRODUCT */
window.addProduct = async function(){

    if(user.role!=="seller"){
        alert("Unahitaji kuwa seller");
        return;
    }

    await addDoc(collection(db,"products"),{
        name: name.value,
        price: price.value,
        unit: unit.value,
        img: img.value,
        category: category.value,
        subcategory: subcategory.value
    });

    alert("Imeongezwa");
    loadProducts();
}

/* NAV */
window.showView=function(v){
    document.querySelectorAll("main>div").forEach(d=>d.classList.add("hidden"));
    document.getElementById(v+"-view").classList.remove("hidden");
}

</script>

</body>
</html>
